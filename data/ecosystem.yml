packages:
  # Official
  stylelint-config-recommended:
    official: true
  stylelint-config-standard:
    official: true

  # In alphabetical order
  '@primer/stylelint-config': {}
  '@shopify/stylelint-plugin':
    package-manager: 'yarn'
    test-command: 'NODE_OPTIONS="--experimental-vm-modules --no-warnings" npx jest --runInBand'
  '@stylistic/stylelint-config':
    package-manager: 'pnpm'
    test-command: 'make test'
  '@stylistic/stylelint-plugin':
    package-manager: 'pnpm'
    test-command: 'make test'
  '@wordpress/stylelint-config':
    # The package has no `npm test` script in its monorepo.
    # See: https://github.com/WordPress/gutenberg/tree/3a1fb6f3620d7b96180ad1761682e2e69c5a5332/packages/stylelint-config
    test-command: 'npx jest --rootDir . --testMatch "**/test/**/*.js" --testPathIgnorePatterns "/node_modules/" "/test/utils/"'
  jest-preset-stylelint: {}
  stylelint-actions-formatters: {}
  stylelint-checkstyle-reporter: {}
  stylelint-config-clean-order:
    package-manager: 'pnpm'
  stylelint-config-css-modules: {}
  stylelint-config-html: {}
  stylelint-config-idiomatic-order: {}
  stylelint-config-property-sort-order-smacss: {}
  stylelint-config-recess-order: {}
  stylelint-config-recommended-scss: {}
  stylelint-config-recommended-vue: {}
  stylelint-config-sass-guidelines: {}
  stylelint-config-standard-scss: {}
  stylelint-config-standard-vue: {}
  stylelint-config-suitcss: {}
  stylelint-config-twbs-bootstrap: {}
  stylelint-config-wikimedia: {}
  stylelint-config-xo: {}
  stylelint-config-xo-scss: {}
  # stylelint-csstree-validator: {}
  stylelint-declaration-block-no-ignored-properties: {}
  stylelint-declaration-strict-value: {}
  stylelint-formatter-pretty: {}
  stylelint-high-performance-animation: {}
  stylelint-less:
    package-manager: 'pnpm'
    test-command: 'pnpm -r test'
  stylelint-media-use-custom-media: {}
  stylelint-no-unsupported-browser-features:
    package-manager: 'pnpm'
  stylelint-order: {}
  stylelint-plugin-defensive-css: {}
  stylelint-plugin-logical-css: {}
  # stylelint-plugin-stylus: {}
  stylelint-prettier: {}
  stylelint-react-native: {}
  stylelint-scss: {}
  stylelint-selector-bem-pattern: {}
  # stylelint-stylus: {}
  stylelint-suitcss: {}
  stylelint-test-rule-node: {}
  stylelint-use-logical: {}
  stylelint-use-logical-spec: {}
  stylelint-use-nesting: {}
  stylelint-value-no-unknown-custom-properties: {}
  stylelint-webpack-plugin: {}
