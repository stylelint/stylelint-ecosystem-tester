name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    uses: stylelint/.github/.github/workflows/call-lint.yml@61e84671c2d4d7af47353e7f5289a2df81bd681d # 0.7.0
    permissions:
      contents: read

  test:
    uses: stylelint/.github/.github/workflows/call-test.yml@61e84671c2d4d7af47353e7f5289a2df81bd681d # 0.7.0
    with:
      node-version: '["lts/*"]'
    permissions:
      contents: read
